<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Harmonia icon">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0ea5a4" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <!-- soft radial overlay to add depth -->
    <radialGradient id="overlay" cx="60%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35" />
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" />
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="4" y="4" width="120" height="120" rx="20" fill="url(#bg)" />
  <!-- soft radial overlay for extra depth -->
  <rect x="4" y="4" width="120" height="120" rx="20" fill="url(#overlay)" style="mix-blend-mode:screen;" />

  <!-- Solid white H: two vertical bars and a middle connector -->
  <rect x="36" y="28" width="14" height="72" rx="6" fill="#ffffff" />
  <rect x="78" y="28" width="14" height="72" rx="6" fill="#ffffff" />
  <rect x="36" y="56" width="56" height="16" rx="4" fill="#ffffff" />

  <title>Harmonia</title>
</svg>
